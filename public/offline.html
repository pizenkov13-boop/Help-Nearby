<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#007bff" />
    <title>Offline — Help Nearby</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #030303;
        color: #f3f4f6;
        padding: 1.5rem;
      }
      .card {
        max-width: 24rem;
        text-align: center;
      }
      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.25rem;
        border-radius: 1rem;
        background: #007bff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.75rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        color: #9ca3af;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      a {
        display: inline-block;
        background: #007bff;
        color: #fff;
        text-decoration: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
      }
      a:hover {
        background: #0069d9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">📍</div>
      <h1>You&apos;re offline</h1>
      <p>
        Help Nearby needs a connection to load new data. Previously visited pages may
        still be available.
      </p>
      <a href="/">Try again</a>
    </div>
  </body>
</html>
